services:
  mariadb-production:
    image: mariadb:11.8
    container_name: mariadb_production
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
      # Clients are created per-deployment by deploy.sh — no default DB here
    volumes:
      - mariadb_prod_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    secrets:
      - mariadb_root_password
    networks:
      - mariadb_prod_net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Health check — deploy.sh waits for this before creating client DBs
    healthcheck:
      test: ["CMD-SHELL", "mariadb -uroot -p\"$(cat /run/secrets/mariadb_root_password)\" -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

secrets:
  mariadb_root_password:
    file: ./secrets/root_password

volumes:
  mariadb_prod_data:
    driver: local

networks:
  mariadb_prod_net:
    external: true
